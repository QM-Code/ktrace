name: Overseer Sanity

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Required Tracked Files
        run: |
          required=(
            "README.md"
            ".gitignore"
            "agent/BOOTSTRAP.md"
            "install/README.parent.md"
            "install/PROJECT.template.md"
            "install/ASSIGNMENTS.template.md"
            "install/SPECIALIST_PACKET.template.md"
            "install/read.template"
            "install/execute.template"
            "install/map.template"
            "scripts/setup.sh"
            "scripts/setup.bat"
            "scripts/lint-config-projects.sh"
          )
          for path in "${required[@]}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Missing required file: ${path}" >&2
              exit 1
            fi
          done

      - name: Verify Config Ignore Rule
        run: grep -Fx "/config/" .gitignore

      - name: Validate BOOTSTRAP References
        run: |
          grep -F "config/read" agent/BOOTSTRAP.md
          grep -F "config/execute" agent/BOOTSTRAP.md
          grep -F "config/map" agent/BOOTSTRAP.md
          grep -F "config/projects/ASSIGNMENTS.md" agent/BOOTSTRAP.md
          grep -F "install/read.template" agent/BOOTSTRAP.md
          grep -F "install/execute.template" agent/BOOTSTRAP.md
          grep -F "install/map.template" agent/BOOTSTRAP.md

      - name: Run Setup Stub
        run: bash ./scripts/setup.sh
